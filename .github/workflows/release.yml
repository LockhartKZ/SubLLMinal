name: Release

# Builds the portable, no-installer artifacts for all three desktop OSes and
# attaches them to a DRAFT GitHub Release. Triggered only by pushing a version
# tag (e.g. `v0.2.0`) — never by pull_request, so forks can never obtain the
# write-scoped token used by the `release` job below.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least privilege by default: the build matrix only needs to read the repo. The
# single `release` job opts into `contents: write` to publish the draft. CI
# (ci.yml) stays read-only; the write scope lives only here, only on tags.
permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal macOS .app runs on both Intel and Apple Silicon.
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles app
          - platform: ubuntu-22.04 # oldest base with WebKitGTK 4.1 → widest Linux support
            args: --bundles appimage
          - platform: windows-latest
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Add macOS universal Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (tauri)
        run: npm run tauri build -- ${{ matrix.args }}

      # Collect the portable artifact(s) for this OS into a dedicated artifacts/
      # folder. NB: do NOT reuse dist/ — that's where Vite builds the web UI
      # (index.html + assets/), and sweeping those into the release upload makes
      # `gh release create` choke on the assets/ directory.
      # VERSION strips the leading "v" from the tag for friendly filenames; on a
      # manual (workflow_dispatch) run it falls back to the package.json value.
      - name: Stage artifacts
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          case "$REF_NAME" in v*) VERSION="${REF_NAME#v}";; *) VERSION="$(node -p "require('./package.json').version")";; esac
          case "${{ matrix.platform }}" in
            macos-latest)
              ditto -c -k --keepParent \
                "src-tauri/target/universal-apple-darwin/release/bundle/macos/SubLLMinal.app" \
                "artifacts/SubLLMinal_${VERSION}_universal.zip"
              ;;
            ubuntu-22.04)
              cp src-tauri/target/release/bundle/appimage/*.AppImage artifacts/
              ;;
            windows-latest)
              # Portable, no-install single exe (the release binary is self-contained).
              cp "src-tauri/target/release/app.exe" "artifacts/SubLLMinal_${VERSION}_x64-portable.exe"
              # Also ship the NSIS installer for users who prefer it.
              cp src-tauri/target/release/bundle/nsis/*-setup.exe artifacts/ || true
              ;;
          esac
          ls -la artifacts

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-${{ matrix.platform }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish draft release
    needs: build
    runs-on: ubuntu-latest
    # Only publish for an actual version tag — a manual workflow_dispatch run is
    # build-only (its ref is a branch, which has no release to attach to).
    if: startsWith(github.ref, 'refs/tags/v')
    # The only place that can write to the repo — scoped to releases (contents).
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create / update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ls -la artifacts
          NOTES="Portable, no-installer builds. See the README for how to run on each platform.

          - **Windows**: \`SubLLMinal_*_x64-portable.exe\` (or the \`*-setup.exe\` installer)
          - **macOS**: \`SubLLMinal_*_universal.zip\` (Intel + Apple Silicon; unsigned — clear Gatekeeper via System Settings ▸ Privacy & Security, or \`xattr -dr com.apple.quarantine\`)
          - **Linux**: \`*.AppImage\` (\`chmod +x\` then run)"
          if gh release view "$REF_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$REF_NAME" artifacts/* --repo "$REPO" --clobber
          else
            gh release create "$REF_NAME" artifacts/* \
              --repo "$REPO" \
              --draft \
              --title "SubLLMinal $REF_NAME" \
              --notes "$NOTES"
          fi
